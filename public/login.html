<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign In</title>
    <style>
      :root {
        --bg: #15222c;
        --card: #213847;
        --accent: #f2c14e;
        --text: #f3f6f7;
        --muted: #b6c1c8;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: linear-gradient(135deg, #132029, #0e171d);
        color: var(--text);
        font-family: "Avenir Next", "Segoe UI", sans-serif;
      }
      .card {
        width: min(420px, 92vw);
        background: var(--card);
        border-radius: 16px;
        padding: 24px;
        box-shadow: 0 12px 28px rgba(0, 0, 0, 0.25);
      }
      h1 { margin-top: 0; }
      p { color: var(--muted); }
      form { display: grid; gap: 12px; }
      input {
        border: 1px solid #3b5567;
        border-radius: 10px;
        padding: 12px;
        background: #172832;
        color: var(--text);
      }
      button {
        border: none;
        border-radius: 10px;
        padding: 12px;
        font-weight: 700;
        cursor: pointer;
        background: var(--accent);
        color: #2f2206;
      }
      .error { color: #ff9d9d; min-height: 1.2em; }
      a { color: #ffd56a; }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Sign In</h1>
      <p>Sign in to access your dashboard and OAuth authorization flow.</p>
      <form id="loginForm">
        <input name="email" type="email" placeholder="Email" required />
        <input name="password" type="password" placeholder="Password" required />
        <button type="submit">Sign In</button>
      </form>
      <div class="error" id="error"></div>
      <p>No account? <a href="/signup">Create one</a></p>
    </div>

    <script>
      const form = document.getElementById('loginForm');
      const errorEl = document.getElementById('error');
      const params = new URLSearchParams(window.location.search);
      const next = params.get('next') || '/dashboard';

      form.addEventListener('submit', async (event) => {
        event.preventDefault();
        errorEl.textContent = '';

        const formData = new FormData(form);
        const payload = {
          email: formData.get('email'),
          password: formData.get('password'),
          next,
        };

        const response = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        });

        const data = await response.json();
        if (!response.ok) {
          errorEl.textContent = data.error || 'Sign in failed';
          return;
        }

        window.location.href = data.next || next;
      });
    </script>
  </body>
</html>
