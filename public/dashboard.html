<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard</title>
    <style>
      :root {
        --bg: #f4efe6;
        --ink: #1b2429;
        --muted: #5f6d75;
        --panel: #fffaf1;
        --line: #d9c7a9;
        --accent: #da6a30;
        --good: #2f8f5b;
        --warn: #ce7f2b;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "Avenir Next", "Segoe UI", sans-serif;
        background: linear-gradient(180deg, #f1e6d4 0, var(--bg) 160px);
        color: var(--ink);
      }
      .container {
        max-width: 1080px;
        margin: 0 auto;
        padding: 20px;
      }
      .topbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
      }
      .topbar h1 { margin: 0; }
      .buttons { display: flex; gap: 8px; flex-wrap: wrap; }
      button {
        border: 1px solid var(--line);
        background: white;
        color: var(--ink);
        border-radius: 9px;
        padding: 8px 12px;
        cursor: pointer;
      }
      button.primary {
        border-color: transparent;
        background: var(--accent);
        color: white;
        font-weight: 600;
      }
      .grid {
        margin-top: 16px;
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 12px;
      }
      .card {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 14px;
      }
      .metric {
        font-size: 1.6rem;
        font-weight: 800;
        margin-top: 4px;
      }
      .sub {
        color: var(--muted);
        font-size: 0.9rem;
      }
      .layout {
        margin-top: 16px;
        display: grid;
        grid-template-columns: 1.2fr 1fr;
        gap: 12px;
      }
      @media (max-width: 900px) {
        .layout { grid-template-columns: 1fr; }
      }
      form {
        display: grid;
        gap: 8px;
      }
      .row {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 8px;
      }
      @media (max-width: 640px) {
        .row { grid-template-columns: 1fr; }
      }
      input, select {
        width: 100%;
        border: 1px solid var(--line);
        background: #fff;
        border-radius: 8px;
        padding: 10px;
      }
      table {
        width: 100%;
        border-collapse: collapse;
      }
      th, td {
        text-align: left;
        border-bottom: 1px solid var(--line);
        padding: 8px 6px;
        font-size: 0.92rem;
      }
      .token {
        margin-top: 8px;
        padding: 8px;
        border-radius: 8px;
        border: 1px dashed var(--line);
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        overflow-wrap: anywhere;
      }
      .status {
        min-height: 1.2em;
        color: var(--warn);
      }
      .ok { color: var(--good); }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="topbar">
        <div>
          <h1>Calorie Dashboard</h1>
          <div class="sub" id="welcome">Loading user...</div>
        </div>
        <div class="buttons">
          <button id="refreshBtn">Refresh</button>
          <button id="tokenBtn">Generate API Token</button>
          <button id="logoutBtn">Logout</button>
        </div>
      </div>

      <div class="grid" id="summaryCards"></div>

      <div class="layout">
        <section class="card">
          <h3>Update Profile + Tracking</h3>
          <form id="profileForm">
            <div class="row">
              <input type="number" step="0.1" name="height_cm" placeholder="Height (cm)" />
              <input type="number" name="age" placeholder="Age" />
            </div>
            <div class="row">
              <select name="gender">
                <option value="">Gender</option>
                <option value="male">Male</option>
                <option value="female">Female</option>
              </select>
              <select name="activity_level">
                <option value="">Activity level</option>
                <option value="sedentary">Sedentary</option>
                <option value="light">Light</option>
                <option value="moderate">Moderate</option>
                <option value="active">Active</option>
                <option value="very_active">Very active</option>
              </select>
            </div>
            <div class="row">
              <input type="number" step="0.1" name="weight_kg" placeholder="Weight (kg)" />
              <input type="number" step="0.1" name="muscle_mass_kg" placeholder="Muscle mass (kg)" />
            </div>
            <input type="number" step="0.1" name="body_fat_percentage" placeholder="Body fat (%)" />
            <button class="primary" type="submit">Save Profile</button>
          </form>
          <div class="status" id="profileStatus"></div>
        </section>

        <section class="card">
          <h3>Add Food Entry</h3>
          <form id="entryForm">
            <input name="food_name" placeholder="Food name" required />
            <div class="row">
              <input type="number" name="calories" placeholder="Calories" required />
              <select name="meal_type">
                <option value="">Meal type</option>
                <option value="breakfast">Breakfast</option>
                <option value="lunch">Lunch</option>
                <option value="dinner">Dinner</option>
                <option value="snack">Snack</option>
              </select>
            </div>
            <div class="row">
              <input type="number" step="0.1" name="protein_g" placeholder="Protein (g)" />
              <input type="number" step="0.1" name="carbs_g" placeholder="Carbs (g)" />
            </div>
            <input type="number" step="0.1" name="fat_g" placeholder="Fat (g)" />
            <button class="primary" type="submit">Add Entry</button>
          </form>
          <div class="status" id="entryStatus"></div>
        </section>
      </div>

      <section class="card" style="margin-top: 12px">
        <h3>Today's Entries</h3>
        <table>
          <thead>
            <tr>
              <th>Food</th>
              <th>Meal</th>
              <th>Calories</th>
              <th>Macros</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="entriesBody"></tbody>
        </table>
      </section>

      <section class="card" style="margin-top: 12px">
        <h3>API Token</h3>
        <div class="sub">Use this token as <code>Authorization: Bearer &lt;token&gt;</code> for MCP endpoints.</div>
        <div class="token" id="tokenOutput">No token generated in this session.</div>
      </section>
    </div>

    <script>
      const $ = (id) => document.getElementById(id);
      const toNumber = (value) => (value === '' || value == null ? undefined : Number(value));

      async function authFetch(url, options = {}) {
        const response = await fetch(url, {
          credentials: 'include',
          ...options,
          headers: {
            'Content-Type': 'application/json',
            ...(options.headers || {}),
          },
        });

        if (response.status === 401) {
          window.location.href = '/login?next=' + encodeURIComponent('/dashboard');
          throw new Error('Unauthenticated');
        }

        return response;
      }

      function setStatus(id, text, ok = false) {
        const el = $(id);
        el.textContent = text || '';
        el.className = 'status' + (ok ? ' ok' : '');
      }

      function renderSummary(data) {
        const profile = data.profile || {};
        const tracking = profile.latest_tracking || {};
        const cards = [
          { label: 'Calories', value: data.totals?.calories ?? 0 },
          { label: 'Protein (g)', value: Math.round(data.totals?.protein_g ?? 0) },
          { label: 'BMR', value: tracking.bmr_calories ?? '--' },
          { label: 'TDEE', value: tracking.tdee_calories ?? '--' },
        ];

        $('summaryCards').innerHTML = cards
          .map(
            (card) => `
              <article class="card">
                <div class="sub">${card.label}</div>
                <div class="metric">${card.value}</div>
              </article>
            `
          )
          .join('');
      }

      function renderEntries(entries) {
        $('entriesBody').innerHTML = entries
          .map(
            (entry) => `
              <tr>
                <td>${entry.food_name}</td>
                <td>${entry.meal_type || '-'}</td>
                <td>${entry.calories}</td>
                <td>P ${entry.protein_g || 0} / C ${entry.carbs_g || 0} / F ${entry.fat_g || 0}</td>
                <td><button data-delete="${entry.id}">Delete</button></td>
              </tr>
            `
          )
          .join('');

        document.querySelectorAll('[data-delete]').forEach((button) => {
          button.addEventListener('click', async () => {
            const entryId = button.getAttribute('data-delete');
            await authFetch(`/api/entries/${entryId}`, { method: 'DELETE' });
            await loadDashboard();
          });
        });
      }

      async function loadDashboard() {
        const meResp = await authFetch('/api/me');
        const me = await meResp.json();
        $('welcome').textContent = `${me.name} (${me.email})`;

        const response = await authFetch('/api/dashboard');
        const data = await response.json();
        renderSummary(data);
        renderEntries(data.entries || []);
      }

      $('profileForm').addEventListener('submit', async (event) => {
        event.preventDefault();
        setStatus('profileStatus', '');

        const formData = new FormData(event.target);
        const payload = {
          height_cm: toNumber(formData.get('height_cm')),
          age: toNumber(formData.get('age')),
          gender: formData.get('gender') || undefined,
          activity_level: formData.get('activity_level') || undefined,
          weight_kg: toNumber(formData.get('weight_kg')),
          muscle_mass_kg: toNumber(formData.get('muscle_mass_kg')),
          body_fat_percentage: toNumber(formData.get('body_fat_percentage')),
        };

        const response = await authFetch('/api/profile', {
          method: 'PUT',
          body: JSON.stringify(payload),
        });

        const data = await response.json();
        if (!response.ok) {
          setStatus('profileStatus', data.error || 'Failed to save profile');
          return;
        }

        setStatus('profileStatus', 'Profile updated.', true);
        await loadDashboard();
      });

      $('entryForm').addEventListener('submit', async (event) => {
        event.preventDefault();
        setStatus('entryStatus', '');

        const formData = new FormData(event.target);
        const payload = {
          food_name: formData.get('food_name'),
          calories: Number(formData.get('calories')),
          meal_type: formData.get('meal_type') || undefined,
          protein_g: toNumber(formData.get('protein_g')),
          carbs_g: toNumber(formData.get('carbs_g')),
          fat_g: toNumber(formData.get('fat_g')),
        };

        const response = await authFetch('/api/entries', {
          method: 'POST',
          body: JSON.stringify(payload),
        });

        const data = await response.json();
        if (!response.ok) {
          setStatus('entryStatus', data.error || 'Failed to add entry');
          return;
        }

        event.target.reset();
        setStatus('entryStatus', 'Entry added.', true);
        await loadDashboard();
      });

      $('refreshBtn').addEventListener('click', loadDashboard);

      $('tokenBtn').addEventListener('click', async () => {
        const response = await authFetch('/api/tokens/rotate', { method: 'POST' });
        const data = await response.json();
        if (!response.ok) {
          $('tokenOutput').textContent = data.error || 'Failed to generate token';
          return;
        }
        $('tokenOutput').textContent = data.token;
      });

      $('logoutBtn').addEventListener('click', async () => {
        await authFetch('/api/auth/logout', { method: 'POST' });
        window.location.href = '/login';
      });

      loadDashboard().catch((error) => {
        console.error(error);
      });
    </script>
  </body>
</html>
